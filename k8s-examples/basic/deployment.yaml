apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: skyline
  name: skyline-app
  labels:
    app: skyline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skyline
  template:
    metadata:
      annotations:
        ad.datadoghq.com/skyline.logs: >-
          [{"source":"java","service":"skyline-app","tags":["env:demo","version:test2"]}]
      labels:
        app: skyline
        tags.datadoghq.com/env: demo
        tags.datadoghq.com/service: skyline-app
        tags.datadoghq.com/version: test2
    spec:
      containers:
      - name: skyline
        image: 438916407893.dkr.ecr.ap-northeast-2.amazonaws.com/skyline:test4
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DD_AGENT_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: DD_TRACE_AGENT_PORT
          value: "8126"
        - name: DD_SERVICE
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tags.datadoghq.com/service']
        - name: DD_ENV
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tags.datadoghq.com/env']
        - name: DD_VERSION
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tags.datadoghq.com/version']
        - name: DD_TRACE_SAMPLING_RULES
          value: >-
            [{"service":"skyline-app","tags":{"http.url":"http://.*/health$"},"sample_rate":0.0},
            {"service":"skyline-app","tags":{"http.url":"http://.*/ready$"},"sample_rate":0.0},
            {"service":"skyline-app","tags":{"http.url":"http://.*/actuator/health$"},"sample_rate":0.0},
            {"service":"skyline-app","tags":{"http.url":"http://.*/actuator/prometheus$"},"sample_rate":0.0},
            {"service":"skyline-app","tags":{"http.useragent":"kube-probe/.*"},"sample_rate":0.0},
            {"service":"skyline-app","resource":"GET /health","sample_rate":0.0},
            {"service":"skyline-app","resource":"GET /ready","sample_rate":0.0},
            {"service":"skyline-app","resource":"GET /actuator/health","sample_rate":0.0},
            {"service":"skyline-app","resource":"GET /actuator/prometheus","sample_rate":0.0},
            {"service":"skyline-app","sample_rate":0.05}]
        - name: DD_TRACE_RATE_LIMIT
          value: "10"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: skyline-db-secret
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: skyline-db-secret
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: skyline-db-secret
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: skyline-db-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: skyline-db-secret
              key: DB_PASSWORD
        - name: DB_CONNECTION_POOL_SIZE
          value: "10"
        startupProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 18
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
